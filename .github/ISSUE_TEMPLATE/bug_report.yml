name: Bug Report / バグ報告
description: Report a bug or unexpected behavior / バグや予期しない動作を報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug!
        バグの報告ありがとうございます!

        > **Security issues:** Please do not report security vulnerabilities here. Use [GitHub's private vulnerability reporting](https://github.com/Tiryoh/rosbag-analyzer-web/security) instead.
        >
        > **セキュリティに関する報告:** セキュリティ上の脆弱性はここでは報告しないでください。[GitHub のプライベート脆弱性報告機能](https://github.com/Tiryoh/rosbag-analyzer-web/security) をご利用ください。

  - type: textarea
    id: description
    attributes:
      label: Description / 説明
      description: |
        A clear description of the bug.
        バグの内容を分かりやすく説明してください。
      placeholder: |
        What happened? What did you expect to happen?
        何が起きましたか? 本来はどうなるべきでしたか?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 再現手順
      description: |
        Steps to reproduce the behavior.
        再現手順を記載してください。
      placeholder: |
        1. Open the app
        2. Upload a .bag file
        3. Click '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment / 環境
      description: |
        Browser, OS, file format, etc.
        ブラウザ、OS、ファイル形式など。
      placeholder: |
        - Browser: Chrome 120
        - OS: Ubuntu 24.04
        - File format: .bag / .mcap / .mcap.zstd
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / スクリーンショット
      description: |
        If applicable, add screenshots to help explain the problem.
        該当する場合はスクリーンショットを添付してください。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 補足情報
      description: |
        Any other context about the problem.
        その他の補足情報があれば記載してください。
    validations:
      required: false
