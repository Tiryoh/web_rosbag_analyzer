name: test

on:
  push:
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'vite.singlefile.config.ts'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'vite.singlefile.config.ts'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx vitest run --reporter=junit --outputFile=junit.xml

      - name: Publish Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit.xml

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [standard, singlefile]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        if: matrix.variant == 'standard'

      - run: npm run test:e2e:singlefile
        if: matrix.variant == 'singlefile'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.variant }}
          path: ${{ matrix.variant == 'singlefile' && 'playwright-report-singlefile/' || 'playwright-report/' }}
          retention-days: 14
