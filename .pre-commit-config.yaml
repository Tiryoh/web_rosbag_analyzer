repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: Gitleaks
        entry: gitleaks git --pre-commit --redact --staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: gitleaks-push
        name: Gitleaks (pre-push)
        entry: gitleaks git --pre-commit --redact
        language: system
        pass_filenames: false
        stages: [pre-push]
